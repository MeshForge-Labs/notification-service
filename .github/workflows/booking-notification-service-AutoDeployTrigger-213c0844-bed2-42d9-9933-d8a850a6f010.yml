name: Trigger auto deployment for booking-notification-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/booking-notification-service-AutoDeployTrigger-213c0844-bed2-42d9-9933-d8a850a6f010.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.BOOKINGNOTIFICATIONSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BOOKINGNOTIFICATIONSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BOOKINGNOTIFICATIONSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.BOOKINGNOTIFICATIONSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BOOKINGNOTIFICATIONSERVICE_REGISTRY_PASSWORD }}
          containerAppName: booking-notification-service
          resourceGroup: booking-rg
          imageToBuild: hiranyakuruppu/booking-notification-service:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


