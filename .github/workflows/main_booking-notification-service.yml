# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - booking-notification-service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: mybookingacr.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_165DCE1589AB4699AE8FE80FEC81F3E0 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_B1B5443A1CE44906B86FD636D311AFAF }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: mybookingacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_165DCE1589AB4699AE8FE80FEC81F3E0 }}/notification-service:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_620D3A26775E4E38BDC4E7EAA62EBAED }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0DC28E6044594257B248C9E51736B8BC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6E365CE9E71948D98FF60669E9AF4F2E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'booking-notification-service'
          slot-name: 'Production'
          images: 'mybookingacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_165DCE1589AB4699AE8FE80FEC81F3E0 }}/notification-service:${{ github.sha }}'
          