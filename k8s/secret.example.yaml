# Example Secret. Do NOT commit real credentials.
# For mock mode (log only): set MOCK_EMAIL=true and omit SMTP_*.
# For real email: set SMTP_HOST, SMTP_USER, SMTP_PASS (and optionally SMTP_PORT, SMTP_SECURE, SMTP_FROM).
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
  labels:
    app: notification-service
type: Opaque
stringData:
  # Mock mode: log notification only, no SMTP
  MOCK_EMAIL: "true"

  # SMTP (use when MOCK_EMAIL is false)
  # SMTP_HOST: "smtp.example.com"
  # SMTP_PORT: "587"
  # SMTP_SECURE: "false"
  # SMTP_USER: "noreply@example.com"
  # SMTP_PASS: "CHANGE_ME"
  # SMTP_FROM: "noreply@example.com"

  LOG_LEVEL: "info"
  NODE_ENV: "production"
